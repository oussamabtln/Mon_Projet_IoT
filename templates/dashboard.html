{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Station Météo IA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* DESIGN GÉNÉRAL */
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; transition: background 1.5s ease; }
        h1 { margin-top: 20px; font-weight: 800; text-transform: uppercase; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.2); z-index: 10; text-align: center;}

        /* SCÈNE MÉTÉO */
        .weather-scene { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; overflow: hidden; }
        .sun { position: absolute; top: 50px; right: 50px; width: 120px; height: 120px; background: radial-gradient(circle, #f1c40f 40%, #f39c12 80%); border-radius: 50%; opacity: 0; transform: scale(0.5); transition: 1.5s; }
        .weather-scene.sunny .sun { opacity: 1; transform: scale(1); }

        .weather-particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: 0.5s; }
        .weather-particles.active { opacity: 1; }
        .particle { position: absolute; pointer-events: none; }
        /* Pluie */
        .weather-particles.rain .particle { width: 2px; height: 20px; background: #fff; opacity: 0.6; animation: rainFall 0.7s infinite linear; }
        /* Neige */
        .weather-particles.snow .particle { width: 8px; height: 8px; background: white; border-radius: 50%; box-shadow: 0 0 5px white; animation: snowFall 4s infinite linear; }

        /* DASHBOARD GRID */
        .dashboard-container {
            display: grid; grid-template-columns: 280px 1fr; gap: 30px;
            max-width: 1200px; width: 100%; margin-top: 30px; z-index: 10;
        }

        /* PERSONNAGE */
        .character-column { display: flex; flex-direction: column; align-items: center; }
        .blob-container { position: relative; width: 250px; height: 350px; display: flex; flex-direction: column; align-items: center; }
        .char-bubble { background: white; padding: 15px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); font-weight: bold; text-align: center; min-width: 200px; }
        .char-bubble::after { content: ''; position: absolute; bottom: -10px; left: 50%; border-width: 10px 10px 0; border-style: solid; border-color: white transparent; transform: translateX(-50%); }

        /* BLOB ANIMATIONS */
        .blob { width: 150px; height: 150px; background: #2ecc71; border-radius: 50%; position: relative; transition: 0.5s; box-shadow: inset -10px -10px 0 rgba(0,0,0,0.1); z-index: 2; }
        .face { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 100%; text-align: center; }
        .eye { width: 15px; height: 15px; background: #333; border-radius: 50%; display: inline-block; margin: 0 5px; animation: blink 4s infinite; }
        .mouth { width: 30px; height: 15px; background: #333; border-radius: 0 0 30px 30px; margin: 5px auto 0; transition: 0.3s; }
        .arm { position: absolute; width: 35px; height: 50px; background: inherit; border-radius: 20px; top: 60%; transition: 0.5s; z-index: 5; }
        .arm.left { left: -15px; transform: rotate(20deg); transform-origin: top right; }
        .arm.right { right: -15px; transform: rotate(-20deg); transform-origin: top left; }

        /* Accessoires */
        .umbrella { position: absolute; top: -70px; right: -40px; opacity: 0; transform: scale(0); transition: 0.5s; z-index: 1; }
        .umbrella-canopy { width: 120px; height: 60px; background: #e74c3c; border-radius: 60px 60px 0 0; }
        .umbrella-handle { width: 6px; height: 80px; background: #333; margin: 0 auto; }
        .fire-container { position: absolute; top: -30px; left: 0; width: 100%; height: 100%; opacity: 0; transition: 0.5s; pointer-events: none; }
        .flame { position: absolute; bottom: 50%; left: 50%; width: 20px; height: 20px; background: radial-gradient(circle, #f1c40f, #e74c3c); border-radius: 50% 0 50% 50%; transform: rotate(-45deg); opacity: 0; }

        /* États Blob */
        .blob.hot { background: #e74c3c; border-radius: 40% 40% 60% 60%; animation: panting 1s infinite; }
        .blob.hot .fire-container { opacity: 1; } .blob.hot .flame { animation: burnRising 1.5s infinite; }
        .blob.cold { background: #3498db; border-radius: 10px; animation: shiver 0.1s infinite; }
        .blob.wet { background: #2980b9; animation: floating 3s infinite; }
        .blob.wet .umbrella { opacity: 1; transform: scale(1) rotate(-10deg); }
        .blob.wet .arm.right { transform: rotate(-30deg); top: 40%; right: -20px; }
        .blob.normal { animation: bounce 2s infinite; }
        .blob.normal .arm.right { animation: waveHello 1s infinite; }

        /* CARTES DONNÉES */
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .icon { font-size: 2.5rem; margin-bottom: 10px; }
        .value { font-size: 2.5rem; font-weight: 800; color: #333; margin: 5px 0; }
        .label { font-size: 0.9rem; color: #777; text-transform: uppercase; font-weight: 600; }
        .unit { font-size: 1rem; color: #aaa; vertical-align: super; }
        .trend { font-size: 0.8rem; color: #888; margin-bottom: 10px; }
        .btn-graph { display: inline-block; padding: 8px 20px; border-radius: 50px; background: #f0f0f0; color: #333; text-decoration: none; font-size: 0.8rem; font-weight: bold; transition: 0.3s; }
        .btn-graph:hover { background: #333; color: white; }

        /* Couleurs */
        .card.temp .icon { color: #e74c3c; } .card.temp { border-bottom: 5px solid #e74c3c; }
        .card.hum .icon { color: #3498db; }  .card.hum { border-bottom: 5px solid #3498db; }
        .card.co .icon { color: #555; }      .card.co { border-bottom: 5px solid #555; }
        .card.light .icon { color: #f1c40f; } .card.light { border-bottom: 5px solid #f1c40f; }

        /* Carte Prédiction */
        .card.prediction { grid-column: span 2; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 25px; }
        .card.prediction .label { color: rgba(255,255,255,0.8); }
        .card.prediction .value { color: white; font-size: 1.8rem; margin-top: 10px; }
        .card.prediction .icon { color: white; font-size: 3rem; animation: pulse 2s infinite; }

        /* Keyframes */
        @keyframes rainFall { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
        @keyframes snowFall { 0% { transform: translateY(-100%) rotate(0deg); } 100% { transform: translateY(100%) rotate(360deg); } }
        @keyframes burnRising { 0% { transform: translateY(0) scale(0.8); opacity: 0; } 20% { opacity: 1; } 100% { transform: translateY(-50px) scale(1.2); opacity: 0; } }
        @keyframes shiver { 0% { transform: translateX(0); } 25% { transform: translateX(-3px); } 75% { transform: translateX(3px); } }
        @keyframes panting { from { transform: scale(1); } to { transform: scale(1.05); } }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes waveHello { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(30deg); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes blink { 0%, 96%, 100% { transform: scaleY(1); } 98% { transform: scaleY(0.1); } }

        /* Responsive */
        @media (max-width: 900px) {
            .dashboard-container { grid-template-columns: 1fr; }
            .character-column { order: -1; margin-bottom: 20px; }
            .card.prediction { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <h1><i class="fas fa-network-wired"></i> Station IoT & IA</h1>

    <div class="weather-scene" id="weatherScene">
        <div class="sun"></div>
        <div class="weather-particles" id="weatherParticles"></div>
    </div>

    <div class="dashboard-container">

        <div class="character-column">
            <div id="char-bubble-text" class="char-bubble">Connexion à l'IA...</div>
            <div class="blob-container">
                <div id="blob-character" class="blob normal">
                    <div class="fire-container"><div class="flame f1"></div><div class="flame f2"></div><div class="flame f3"></div></div>
                    <div class="umbrella"><div class="umbrella-canopy"></div><div class="umbrella-handle"></div></div>
                    <div class="arm left"></div><div class="arm right"></div>
                    <div class="face"><div class="eyes"><div class="eye"></div><div class="eye"></div></div><div class="mouth"></div></div>
                </div>
            </div>
        </div>

        <div class="data-grid">
            <div class="card temp">
                <i class="fas fa-thermometer-half icon"></i>
                <div class="label">Température</div>
                <div class="value"><span id="temp">--</span><span class="unit">°C</span></div>
                <div id="trend-temp" class="trend">--</div>
                <a href="/graph-temp/" class="btn-graph">Graphique</a>
            </div>

            <div class="card hum">
                <i class="fas fa-tint icon"></i>
                <div class="label">Humidité</div>
                <div class="value"><span id="hum">--</span><span class="unit">%</span></div>
                <div id="trend-hum" class="trend">--</div>
                <a href="/graph-hum/" class="btn-graph">Graphique</a>
            </div>

            <div class="card co">
                <i class="fas fa-smog icon"></i>
                <div class="label">Qualité Air (CO)</div>
                <div class="value"><span id="co">--</span></div>
                <div id="trend-co" class="trend">--</div>
                <a href="/graph-co/" class="btn-graph">Graphique</a>
            </div>

            <div class="card light">
                <i class="fas fa-sun icon"></i>
                <div class="label">Luminosité</div>
                <div class="value"><span id="light">--</span></div>
                <div id="trend-light" class="trend">--</div>
                <a href="/graph-light/" class="btn-graph">Graphique</a>
            </div>

            <div class="card prediction">
                <i class="fas fa-brain icon"></i>
                <div class="label">Prévision Météo (IA)</div>
                <div id="ai-pred" class="value">Analyse en cours...</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "/latest/";

        function createParticles(type, count) {
            const container = document.getElementById('weatherParticles');
            container.innerHTML = '';
            container.className = 'weather-particles active ' + type;
            for (let i = 0; i < count; i++) {
                let p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 1 + 0.5) + 's';
                p.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(p);
            }
        }

        function updateDashboard() {
            fetch(API_URL)
                .then(response => response.json())
                .then(data => {
                    const t = data.temperature ?? 0;
                    const h = data.humidity ?? 0;
                    const c = data.co ?? 0;
                    const l = data.light ?? 0;
                    const pred = data.prediction ?? "Inconnu";

                    document.getElementById('temp').innerText = t;
                    document.getElementById('hum').innerText = h;
                    document.getElementById('co').innerText = c;
                    document.getElementById('light').innerText = l;
                    document.getElementById('ai-pred').innerText = pred;

                    updateTrend('trend-temp', t, data.prev_temp, '°C');
                    updateTrend('trend-hum', h, data.prev_hum, '%');
                    updateTrend('trend-co', c, data.prev_co, '');
                    updateTrend('trend-light', l, data.prev_light, '');

                    updateScene(t, h, c, l, pred);
                })
                .catch(err => console.error(err));
        }

        function updateTrend(id, cur, prev, unit) {
            const el = document.getElementById(id);
            if (!prev) return;
            let icon = '=';
            if (cur > prev) icon = '⬆'; else if (cur < prev) icon = '⬇';
            el.innerHTML = `${icon} Prev: ${prev}${unit}`;
        }

        function updateScene(t, h, c, l, pred) {
            const blob = document.getElementById('blob-character');
            const bub = document.getElementById('char-bubble-text');
            const scene = document.getElementById('weatherScene');
            const particles = document.getElementById('weatherParticles');

            if(!blob) return;

            // 1. RESET (On remet tout à zéro)
            blob.className = "blob";
            if(scene) scene.className = "weather-scene";
            if(particles) { particles.innerHTML = ""; particles.className = "weather-particles"; }
            document.body.style.background = 'linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%)';

            // 2. LOGIQUE INTELLIGENTE (Basée sur l'IA)

            if (pred.includes("Incendie")) {
                // 🔥 INCENDIE DÉTECTÉ
                blob.classList.add('hot');
                bub.innerText = "ALERTE ! INCENDIE DÉTECTÉ ! 🔥";
                document.body.style.background = 'linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%)';
            }
            else if (pred.includes("Pluie")) {
                // 🌧️ PLUIE
                blob.classList.add('wet');
                if(scene) scene.classList.add('rainy'); // Nuages gris
                createParticles('rain', 100); // Pluie
                bub.innerText = "Il va pleuvoir ! ☔";
                document.body.style.background = 'linear-gradient(135deg, #4b6cb7 0%, #182848 100%)';
            }
            else if (pred.includes("Brouillard")) {
                // 🌫️ BROUILLARD
                blob.classList.add('normal');
                bub.innerText = "Attention, brouillard épais 🌫️";
                document.body.style.background = 'linear-gradient(135deg, #bdc3c7 0%, #2c3e50 100%)';
            }
            else if (pred.includes("Ciel Dégagé")) {
                // ☀️ BEAU TEMPS
                blob.classList.add('tanning');
                if(scene) scene.classList.add('sunny');
                bub.innerText = "Quel beau soleil ! 😎";
                document.body.style.background = 'linear-gradient(135deg, #fceabb 0%, #f8b500 100%)';
            }
            else {
                // Cas par défaut (Normal)
                blob.classList.add('normal');
                bub.innerText = "Prévision : " + pred;
            }
        }

        setInterval(updateDashboard, 2000);
        updateDashboard();
    </script>
</body>
</html>
